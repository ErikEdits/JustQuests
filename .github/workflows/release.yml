name: Release

# Fires when a version tag (vX.Y.Z) is pushed, or manually from the Actions
# tab. Builds every MC version and publishes a GitHub Release with all jars
# attached and the matching CHANGELOG section as the notes.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.1.7 (creates tag vX.Y.Z)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Verify tag matches mod_version
        run: |
          MOD_VERSION="$(grep -E '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          if [ "$MOD_VERSION" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Tag version ${{ steps.ver.outputs.version }} does not match mod_version=$MOD_VERSION in gradle.properties"
            exit 1
          fi

      - name: Set up JDK 17 and 21
        # 1.20.4 builds on Java 17, everything else on Java 21. setup-java
        # exposes both as JAVA_HOME_17_X64 / JAVA_HOME_21_X64, which Gradle
        # picks up via org.gradle.java.installations.fromEnv (gradle.properties).
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all versions
        run: ./gradlew build --stacktrace

      - name: Extract changelog notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { f = 1; print; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "JustQuests $VERSION" > RELEASE_NOTES.md
          fi
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: JustQuests ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: neoforge/**/build/libs/*.jar
          fail_on_unmatched_files: true
